[project]
name = "gamecards-ml"
version = "0.1.0"
description = "GameCards ML Training Pipeline — LightGBM quantile regression with ONNX export"
requires-python = ">=3.11"
dependencies = [
    "lightgbm>=4.5",
    "scikit-learn>=1.6",
    "pandas>=2.2",
    "numpy>=1.26,<3",
    "onnx>=1.17",
    "onnxmltools>=1.13",
    "skl2onnx>=1.18",
    "boto3>=1.35",           # R2 upload (S3-compatible)
    "requests>=2.31",        # D1 HTTP API for feature export
    "mlflow>=2.18",
    "shap>=0.46",
    "click>=8.1",
]

[project.scripts]
# Primary CLI names (match docs and CI workflows)
gmestart-train = "gamecards_ml.train:cli"
gmestart-backtest = "gamecards_ml.backtest:cli"
gmestart-export = "gamecards_ml.export_onnx:cli"
gmestart-score = "gamecards_ml.batch_score:cli"
gmestart-export-features = "gamecards_ml.export_features:cli"
# Legacy aliases (backward compat)
gamecards-train = "gamecards_ml.train:cli"
gamecards-backtest = "gamecards_ml.backtest:cli"
gamecards-export = "gamecards_ml.export_onnx:cli"
gamecards-score = "gamecards_ml.batch_score:cli"
gamecards-export-features = "gamecards_ml.export_features:cli"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
