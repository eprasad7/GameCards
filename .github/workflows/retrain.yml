name: Weekly Model Retraining

on:
  schedule:
    # Every Sunday at 2am UTC
    - cron: "0 2 * * 0"
  workflow_dispatch:
    inputs:
      skip_quality_gate:
        description: "Skip MdAPE quality gate (emergency override)"
        required: false
        default: "false"

env:
  PYTHON_VERSION: "3.12"

jobs:
  retrain:
    name: Export → Train → Score → Upload
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: packages/ml-training/pyproject.toml

      - name: Install ML pipeline
        run: pip install -e packages/ml-training

      - name: Export features from D1
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_D1_DATABASE_ID: ${{ secrets.CF_D1_DATABASE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          gmestart-export-features \
            --output-features features.csv \
            --output-training training_data.csv

      - name: Validate export
        run: |
          echo "Training rows: $(wc -l < training_data.csv)"
          echo "Feature rows: $(wc -l < features.csv)"
          if [ $(wc -l < training_data.csv) -lt 100 ]; then
            echo "ERROR: Too few training rows (<100). Aborting."
            exit 1
          fi

      - name: Train models
        run: |
          gmestart-train \
            --data training_data.csv \
            --output models/

      - name: Walk-forward backtest quality gate
        if: ${{ github.event.inputs.skip_quality_gate != 'true' }}
        run: |
          gmestart-backtest \
            --data training_data.csv \
            --output backtest_results.json \
            --max-mdape 45 \
            --min-coverage-p10-p90 75 \
            --min-folds 1

      - name: Skip backtest quality gate
        if: ${{ github.event.inputs.skip_quality_gate == 'true' }}
        run: echo "Skipping walk-forward quality gate via workflow input."

      - name: Export to ONNX
        run: |
          gmestart-export \
            --model-dir models/ \
            --output onnx_models/

      - name: Batch score all cards
        env:
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
        run: |
          gmestart-score \
            --model-dir models/ \
            --features features.csv \
            --output batch_predictions.json \
            --upload

      - name: Upload ONNX models to R2
        env:
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
        run: |
          gmestart-export \
            --model-dir models/ \
            --output onnx_models/ \
            --upload

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: training-artifacts
          path: |
            models/model_meta.json
            backtest_results.json
            batch_predictions.json
          retention-days: 30

      - name: Summary
        run: |
          echo "## Retraining Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Training data: $(wc -l < training_data.csv) rows" >> $GITHUB_STEP_SUMMARY
          echo "- Cards scored: $(python3 -c 'import json; print(len(json.load(open("batch_predictions.json"))))')" >> $GITHUB_STEP_SUMMARY
          echo "- Model version: $(python3 -c 'import json; print(json.load(open("models/model_meta.json"))["version"])')" >> $GITHUB_STEP_SUMMARY
          echo "- Conformal correction: $(python3 -c 'import json; print(json.load(open("models/model_meta.json")).get("conformal_correction", 0))')" >> $GITHUB_STEP_SUMMARY
          if [ -f backtest_results.json ]; then
            echo "- Walk-forward MdAPE: $(python3 -c 'import json; print(json.load(open("backtest_results.json"))["avg_mdape"])')%" >> $GITHUB_STEP_SUMMARY
            echo "- Walk-forward p10-p90 coverage: $(python3 -c 'import json; print(json.load(open("backtest_results.json"))["avg_coverage_p10_p90"])')%" >> $GITHUB_STEP_SUMMARY
            echo "- Backtest folds: $(python3 -c 'import json; print(json.load(open("backtest_results.json"))["folds"])')" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Predictions uploaded to R2. Worker will pick them up within 10 minutes." >> $GITHUB_STEP_SUMMARY
